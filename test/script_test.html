<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Engine Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 20px; }
    .item {
      background-color: #fff;
      border: 1px solid #ddd;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 4px;
    }
    .highlight { background-color: #fffde7; border-color: #f9a825; }
    .result {
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 3px;
    }
    .ok { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>
  <h1 id="title">JavaScript Engine Demo</h1>

  <h2>1. Variable &amp; String Manipulation</h2>
  <div id="string-result"></div>

  <h2>2. Array Operations</h2>
  <ul id="array-list"></ul>

  <h2>3. DOM Style Changes</h2>
  <div id="style-box" style="padding:8px; border:2px solid black; display:inline-block;">
    This box will be styled by JavaScript
  </div>

  <h2>4. Function &amp; Closure</h2>
  <div id="closure-result"></div>

  <h2>5. Counter Loop</h2>
  <div id="counter-output"></div>

  <h2>6. Object &amp; Math</h2>
  <div id="math-result"></div>

  <script>
    // 1. Variable & String Manipulation
    var name = "JavaScript";
    var version = 6;
    var greeting = "Welcome to " + name + " ES" + version + "!";
    document.getElementById("string-result").textContent = greeting;

    // 2. Array Operations
    var numbers = [5, 3, 8, 1, 9, 2, 7, 4, 6];
    var sorted = numbers.slice().sort(function(a, b) { return a - b; });
    var evens = sorted.filter(function(n) { return n % 2 === 0; });
    var doubled = evens.map(function(n) { return n * 2; });
    var ul = document.getElementById("array-list");
    doubled.forEach(function(n) {
      var li = document.createElement("li");
      li.className = "item";
      li.textContent = "Even number doubled: " + n;
      ul.appendChild(li);
    });

    // 3. DOM Style Changes
    var box = document.getElementById("style-box");
    box.style.backgroundColor = "#e3f2fd";
    box.style.borderColor = "#1565c0";
    box.style.color = "#1565c0";

    // 4. Function & Closure
    function makeAdder(x) {
      return function(y) { return x + y; };
    }
    var add5 = makeAdder(5);
    var add10 = makeAdder(10);
    var closureDiv = document.getElementById("closure-result");
    closureDiv.textContent = "add5(3) = " + add5(3) + ", add10(7) = " + add10(7);

    // 5. Counter Loop
    var output = document.getElementById("counter-output");
    var results = [];
    for (var i = 1; i <= 5; i++) {
      results.push(i + "^2 = " + (i * i));
    }
    output.textContent = results.join(", ");

    // 6. Object & Math
    var circle = { radius: 5 };
    circle.area = Math.PI * circle.radius * circle.radius;
    circle.circumference = 2 * Math.PI * circle.radius;
    var mathDiv = document.getElementById("math-result");
    mathDiv.textContent = "Circle r=5: area=" + circle.area.toFixed(2) +
                          ", circumference=" + circle.circumference.toFixed(2);

    // Update title to show JS ran successfully
    document.getElementById("title").textContent = "JavaScript Engine Demo ✓";
  </script>
</body>
</html>
